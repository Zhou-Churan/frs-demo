server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/frs_attendance?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    timeout: 3000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: t_

# 华为云FRS配置
huaweicloud:
  frs:
    ak: ${HUAWEICLOUD_SDK_AK}
    sk: ${HUAWEICLOUD_SDK_SK}
    region: cn-north-4
    face-set-name: face-set-demo

# JWT配置
jwt:
  secret: ${JWT_SECRET:frs-attendance-system-default-secret-key-2026}
  expiration: 86400000

# Knife4j增强配置
knife4j:
  enable: true